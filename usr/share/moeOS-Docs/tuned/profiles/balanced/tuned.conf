#
# tuned configuration
#

[main]
summary=General non-specialized tuned profile

[cpu]
governor=schedutil|ondemand|powersave
energy_perf_bias=normal
energy_performance_preference=balance_performance
boost=1
max_perf_pct=100

[service]
service.moeOS-scheduler@powersave=stop
service.moeOS-intel-lpmd=stop

[acpi]
platform_profile=performance|max-power

[audio]
timeout=5

[video]
radeon_powersave=dpm-balanced, auto
panel_power_savings=0

[sysctl]
kernel.sched_energy_aware=0