#
# tuned configuration
#

[main]
summary=Optimize for low power consumption

[cpu]
governor=schedutil|powersave
energy_perf_bias=12|powersave|power
energy_performance_preference=196|192|power
boost=1
max_perf_pct=95

[service]
#service.moeOS-scheduler@powersave=start
service.moeOS-intel-lpmd=start

[acpi]
platform_profile=balanced|low-power|quiet

[eeepc_she]

[audio]
timeout=1

[video]
radeon_powersave=dpm-battery, auto
panel_power_savings=3

[sysctl]
kernel.sched_energy_aware=1