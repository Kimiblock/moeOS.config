options nvidia NVreg_TemporaryFilePath=/tmp
options nvidia NVreg_PreserveVideoMemoryAllocations=1
options nvidia NVreg_UseKernelSuspendNotifiers=1
options nvidia NVreg_DynamicPowerManagement=0x02

options nvidia NVreg_DynamicPowerManagementVideoMemoryThreshold=200

# S2idle testing
options nvidia NVreg_EnableS0ixPowerManagement=1
options nvidia NVreg_S0ixPowerManagementVideoMemoryThreshold=1024

# Rebar
options nvidia NVreg_EnableResizableBar=1

# Seems to cause stuttering
#options nvidia NVreg_RegistryDwords=RmEnableAggressiveVblank=1

options nvidia NVreg_EnablePCIERelaxedOrderingMode=1
